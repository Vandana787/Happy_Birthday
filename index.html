<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    text-align:center;
}

h1{
    margin-top:120px;
    font-size:60px;
    color:white;
    animation: glow 2s infinite alternate;
}

p{
    font-size:25px;
    color:white;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #fff;}
    to{ text-shadow:0 0 30px #ff00ff;}
}

/* Balloons */
.balloon{
    position:absolute;
    bottom:-150px;
    width:60px;
    height:80px;
    background:red;
    border-radius:50%;
    animation: float 8s infinite;
}

.balloon:after{
    content:"";
    position:absolute;
    width:2px;
    height:70px;
    background:white;
    left:50%;
    top:80px;
}

@keyframes float{
    0%{transform:translateY(0);}
    100%{transform:translateY(-120vh);}
}

button{
    margin-top:30px;
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#ff4081;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday! 🎂</h1>
<p>Wishing you a day full of happiness and surprises!</p>

<button onclick="showMessage()">Click for Surprise 🎁</button>

<script>
function showMessage(){
    alert("🎉 May all your dreams come true! Happy Birthday! 🎂");
}

/* Create balloons */
for(let i=0;i<15;i++){
    let balloon=document.createElement("div");
    balloon.className="balloon";
    balloon.style.left=Math.random()*100+"%";
    balloon.style.background=`hsl(${Math.random()*360},70%,60%)`;
    balloon.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(balloon);
}
</script>

</body>
</html>
